<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Daily Games</title>
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #090b10;
        --card-border: rgba(255, 255, 255, 0.22);
        --card-overlay: rgba(9, 11, 16, 0.45);
        --text-main: #f5f7ff;
        --text-sub: #dde3ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        background: radial-gradient(circle at top, #1c2540 0%, var(--page-bg) 55%);
        color: var(--text-main);
      }

      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 1rem;
      }

      h1 {
        margin: 0.25rem 0 1rem;
        font-size: clamp(1.45rem, 4.8vw, 2rem);
      }

      .games {
        display: grid;
        gap: 0.9rem;
      }

      .game-card {
        position: relative;
        display: block;
        overflow: hidden;
        border: 1px solid var(--card-border);
        border-radius: 16px;
        text-decoration: none;
        color: inherit;
        min-height: 138px;
        transform: translateZ(0);
      }

      .game-card::before {
        content: "";
        position: absolute;
        inset: -8px;
        background-image: var(--card-image, linear-gradient(140deg, #2f4778, #481f56));
        background-size: cover;
        background-position: top center;
        filter: blur(9px) saturate(1.15);
        transform: scale(1.06);
      }

      .game-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--card-overlay);
      }

      .game-card-content {
        position: relative;
        z-index: 1;
        padding: 1rem;
      }

      .game-title {
        margin: 0 0 0.35rem;
        font-size: 1.2rem;
        line-height: 1.2;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      }

      .game-description {
        margin: 0;
        color: var(--text-sub);
        font-size: 0.95rem;
        line-height: 1.35;
        max-width: 58ch;
      }

      .game-url {
        display: inline-block;
        margin-top: 0.55rem;
        font-size: 0.78rem;
        color: #c8d3ff;
        opacity: 0.9;
      }

      @media (min-width: 760px) {
        .games {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Magic: The Gathering Daily Games</h1>
      <section id="games" class="games" aria-label="List of daily games"></section>
    </main>

    <script>
      const dailyGames = [
        {
          title: "Spellify",
          description: "Guess the MTG card from clues and sharpen your daily card knowledge.",
          url: "https://spellify.fun/",
        },
        {
          title: "Enchant Wordle",
          description:
            "A Wordle-style daily puzzle focused on Magic cards, mechanics, and set vocabulary.",
          url: "https://enchantwordle.com/",
        },
        {
          title: "Asmrandle",
          description:
            "Identify the card from cropped art and subtle hints in a quick daily challenge.",
          url: "https://asmrandle.com/",
        },
      ];

      const fallbackGradient = "linear-gradient(140deg, #2f4778, #481f56)";
      const gamesContainer = document.getElementById("games");

      function getLivePreviewUrl(websiteUrl) {
        return `https://image.thum.io/get/width/1200/noanimate/${encodeURIComponent(websiteUrl)}`;
      }

      function createGameCard(game) {
        const card = document.createElement("a");
        card.className = "game-card";
        card.href = game.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.style.setProperty("--card-image", fallbackGradient);

        const content = document.createElement("div");
        content.className = "game-card-content";

        content.innerHTML = `
          <h2 class="game-title">${game.title}</h2>
          <p class="game-description">${game.description}</p>
          <span class="game-url">${new URL(game.url).hostname}</span>
        `;

        card.appendChild(content);
        gamesContainer.appendChild(card);

        const img = new Image();
        img.onload = () => card.style.setProperty("--card-image", `url("${img.src}")`);
        img.src = getLivePreviewUrl(game.url);
      }

      dailyGames.forEach(createGameCard);
    </script>
  </body>
</html>
