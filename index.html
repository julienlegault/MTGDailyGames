    <script>
      // ── Daily reset at 1 am New York time (handles EST/EDT automatically) ──
      function getGameDay() {
        const now = new Date();
        const fmt = new Intl.DateTimeFormat("en-US", {
          timeZone: "America/New_York",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          hour12: false,
        });
        const parts = Object.fromEntries(fmt.formatToParts(now).map(({ type, value }) => [type, value]));
        let [y, m, d] = [parts.year, parts.month, parts.day];
        // If it's before 1 am New York time, the game day is still yesterday
        if (Number(parts.hour) < 1) {
          const yesterday = new Date(Date.UTC(Number(y), Number(m) - 1, Number(d) - 1));
          y = String(yesterday.getUTCFullYear());
          m = String(yesterday.getUTCMonth() + 1).padStart(2, "0");
          d = String(yesterday.getUTCDate()).padStart(2, "0");
        }
        return `${y}-${m}-${d}`;
      }

      function getGameDayLabel() {
        const [y, m, d] = getGameDay().split("-");
        return `${m}/${d}/${y.slice(2)}`;
      }

      const STORAGE_KEY = "mtgdg_" + getGameDay();

      function loadScores() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        } catch {
          return {};
        }
      }

      function saveScore(index, score) {
        const scores = loadScores();
        scores[index] = { score, url: dailyGames[index].url };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
        updateShareBar(scores);
      }

      function updateShareBar(scores) {
        const shareBar = document.getElementById("share-bar");
        const hasScores = Object.keys(scores).length > 0;
        shareBar.style.display = hasScores ? "flex" : "none";
      }

      function copyScoresText() {
        const scores = loadScores();
        const sortedKeys = Object.keys(scores).sort((a, b) => Number(a) - Number(b));
        const parts = sortedKeys.map((idx) => `${scores[idx].score}\n${scores[idx].url}`);
        const text = `${getGameDayLabel()}\n\n${parts.join("\n\n")}`;
        navigator.clipboard.writeText(text).catch(() => {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.cssText = "position:fixed;opacity:0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        });
      }

      const dailyGames = [
        {
          title: "Spellify",

        {

          scoreType: "emoji",
          image: "asmrandle.png",
        },
        {
          title: "EDHREC Crossword",
          description: "Daily MTG crossword game on EDHREC.",
          url: "https://edhrec.com/games/crossword",
          scoreType: "none",
          image: "edhrecCrossword.png",
        },
        {
          title: "Commander Codex",
          description: "A wordle-like game by Archidekt.",
          url: "https://commandercodex.com/",
          scoreType: "emoji",
          image: "commanderCodex.png",
        },
        {
          title: "EDHRankle",
          description: "Similar to Asmrandle, but limited to only commanders.",
          url: "https://edhrankle.com/daily",
          scoreType: "none",
          image: "edhrankle.png",
        },
        {
          title: "Guess the Magic Card",
          description: "Narrow down the card based on its attributes.",
          url: "https://guessthemagiccard.com/",
          scoreType: "emoji",
          image: "guessTheMagicCard.png",
        },
        {
          title: "Magicdoku",
          description: "A Sudoku-style daily puzzle for MTG players.",
          url: "https://magicdoku.web.app/index.html",
          scoreType: "emoji",
          image: "magicdoku.png",
        },
        {
          title: "Card Clash Synergy",
          description: "Test your MTG deck-building and synergy intuition.",
          url: "https://cardclashgames.com/synergy",
          scoreType: "emoji",
          image: "synergy.png",
        },
        {
          title: "Moxle",
          description: "Actual wordle with magic related words. Run by Moxfield, requires sign-in.",
          url: "https://moxfield.com/moxle",
          scoreType: "emoji",
          image: "moxle.png",
        },
        {
          title: "Possibility Storm",
          description: "Daily find-lethal puzzles. Does not show solution.",
          url: "https://www.possibilitystorm.com/",
          scoreType: "none",
          image: "possibilityStorm.png",

      const fallbackGradient = "linear-gradient(140deg, #2f4778, #481f56)";
      const PREVIEW_WIDTH = 1200;
      const PREVIEW_SOURCE_TIMEOUT = 6000;
      const PREVIEW_TOTAL_TIMEOUT = 10000;
      const TRUSTED_PREVIEW_HOSTS = new Set(["image.thum.io", "s.wordpress.com"]);
      const gamesContainer = document.getElementById("games");

      // Match emoji sequences: base Extended_Pictographic + optional variation selector
      // (U+FE00–FE0F), combining enclosing keycap (U+20E3), skin-tone modifier
      // (U+1F3FB–1F3FF), or a single level of ZWJ composition.
      const EMOJI_RE = /\p{Extended_Pictographic}(?:[\u{FE00}-\u{FE0F}]|\u{20E3}|[\u{1F3FB}-\u{1F3FF}])?(?:\u{200D}\p{Extended_Pictographic}(?:[\u{FE00}-\u{FE0F}]|\u{20E3}|[\u{1F3FB}-\u{1F3FF}])?)?/gu;

      const SCORE_FONT_START = 1.4;  // rem — initial size when rendering a score
      const SCORE_FONT_MIN   = 0.1;  // rem — never shrink below this
      const SCORE_FONT_STEP  = 0.05; // rem — amount to reduce per iteration

      function parseScore(text, scoreType) {
        if (scoreType === "number") {
          // Enchant Wordle result is a bare number (e.g. "12")
          const match = text.trim().match(/\d+/);
          return match ? match[0] : null;
        }
        if (scoreType === "emoji") {
          // Keep per-line emoji sequences, drop lines with no emojis
          const lines = text.split("\n").map((line) => {
            const matches = line.match(EMOJI_RE);
            return matches ? matches.join("") : "";
          }).filter((line) => line.length > 0);
          return lines.length > 0 ? lines.join("\n") : null;
        }
        return null;
      }

      function fitScoreText(el, container) {
        let size = SCORE_FONT_START;
        el.style.fontSize = size + "rem";
        while (size > SCORE_FONT_MIN && (el.scrollHeight > container.clientHeight || el.scrollWidth > container.clientWidth)) {
          size = parseFloat((size - SCORE_FONT_STEP).toFixed(2));
          el.style.fontSize = size + "rem";
        }
      }

      function getLivePreviewUrls(websiteUrl) {
        const encoded = encodeURIComponent(websiteUrl);
        return [
          `https://image.thum.io/get/width/${PREVIEW_WIDTH}/noanimate/${encoded}`,
          `https://s.wordpress.com/mshots/v1/${encoded}?w=${PREVIEW_WIDTH}`,
        ];
      }

      function loadPreviewWithFallback(card, warningOverlay, status, websiteUrl) {
        const sources = getLivePreviewUrls(websiteUrl);
        let currentImg = null;
        let sourceTimeout = null;
        let settled = false;

        const overallTimer = setTimeout(() => {
          if (settled) return;
          settled = true;
          if (currentImg) currentImg.src = "";
          if (sourceTimeout) clearTimeout(sourceTimeout);
          warningOverlay.style.display = "flex";
          status.textContent = "Live preview timed out.";
        }, PREVIEW_TOTAL_TIMEOUT);

        function trySource(index) {
          if (settled) return;
          if (index >= sources.length) {
            return;
          }

          currentImg = new Image();
          sourceTimeout = setTimeout(() => {
            if (settled) return;
            currentImg.src = "";
            trySource(index + 1);
          }, PREVIEW_SOURCE_TIMEOUT);

          currentImg.onload = () => {
            clearTimeout(sourceTimeout);
            if (settled) return;
            try {
              const previewUrl = new URL(currentImg.src);
              const isTrustedSource =
                previewUrl.protocol === "https:" && TRUSTED_PREVIEW_HOSTS.has(previewUrl.hostname);

              if (isTrustedSource) {
                clearTimeout(overallTimer);
                settled = true;
                card.style.setProperty("--card-image", `url("${previewUrl.href}")`);
                status.textContent = "Live preview loaded.";
                return;
              }
            } catch {
              // Keep uploaded image when URL parsing fails.
            }

            trySource(index + 1);
          };

          currentImg.onerror = () => {
            clearTimeout(sourceTimeout);
            trySource(index + 1);
          };

          currentImg.src = sources[index];
        }

        trySource(0);
      }

      function createGameCard(game, index, storedScore) {
        // ── Item: grid cell containing the slot ──
        const item = document.createElement("div");
        item.className = "game-item";

        // ── Slot: maintains aspect ratio while card sits inside ──
        const slot = document.createElement("div");
        slot.className = "card-slot";

        const card = document.createElement("div");
        card.className = "game-card";
        card.style.setProperty("--card-image", `url("${game.image}")`);

        // Shows the score-entry form in the text box when conditions are met.
        // Returns true if the form was newly shown, false if conditions were not met.
        function maybeShowScoreForm() {
          if (game.scoreType === "none") return false;
          if (textBox.classList.contains("has-form")) return false; // already showing
          const currentScores = loadScores();
          if (currentScores[index]) return false; // score already recorded

          description.remove();
          textBox.classList.add("has-form");

          let tapInput;
          if (game.scoreType === "number") {
            tapInput = document.createElement("input");
            tapInput.type = "number";
            tapInput.min = "0";
            tapInput.max = "30";
            tapInput.step = "1";
            tapInput.placeholder = "0–30";
          } else {
            tapInput = document.createElement("textarea");
            tapInput.placeholder = "Paste results here";
          }
          tapInput.className = "tap-input";
          tapInput.setAttribute("aria-label", `Result for ${game.title}`);

          const tapSubmit = document.createElement("button");
          tapSubmit.type = "button";
          tapSubmit.className = "tap-submit";
          tapSubmit.textContent = "Submit";
          tapSubmit.addEventListener("click", (e) => {
            e.stopPropagation(); // prevent textBox navigate-handler from re-running
            const raw = tapInput.value.trim();
            if (!raw) return;

            let score;
            if (game.scoreType === "number") {
              const num = Number(raw);
              if (!Number.isInteger(num) || num < 0 || num > 30) {
                tapInput.setCustomValidity("Input the number of guesses");
                tapInput.reportValidity();
                return;
              }
              tapInput.setCustomValidity("");
              score = `${num} guesses`;
            } else {
              score = parseScore(raw, game.scoreType);
            }

            textBox.classList.remove("has-form");
            while (textBox.firstChild) textBox.removeChild(textBox.firstChild);
            const scoreEl = document.createElement("p");
            scoreEl.className = "card-description card-score";
            scoreEl.textContent = score !== null ? score : "Could not read score — please paste the complete result text from the game.";
            textBox.append(scoreEl);
            requestAnimationFrame(() => fitScoreText(scoreEl, textBox));
            if (score !== null) saveScore(index, score);
          });
          textBox.append(tapInput, tapSubmit);
          return true;
        }

        // Top-zone click: navigate to the game URL and switch bottom to results-entry mode
        card.addEventListener("click", (e) => {
          if (e.target.closest(".card-text-box")) return; // text box handles its own clicks
          if (e.target.closest("a")) return;              // card-name <a> handles its own navigation — avoid double window.open
          window.open(game.url, "_blank", "noopener,noreferrer");
          maybeShowScoreForm();
        });

        // ── Inner bordered area ──
        const inner = document.createElement("div");
        inner.className = "card-inner";

        // Name bar: silver gradient, game title + mana-cost circle
        const header = document.createElement("div");
        header.className = "card-header";
        const cardName = document.createElement("a");
        cardName.className = "card-name";
        cardName.href = game.url;
        cardName.target = "_blank";
        cardName.rel = "noopener noreferrer";
        cardName.textContent = game.title;
        header.append(cardName);

        // Art area — extended art, full-bleed, no blur
        const art = document.createElement("div");
        art.className = "card-art";
        art.setAttribute("aria-hidden", "true");

        const artWarning = document.createElement("div");
        artWarning.className = "card-art-warning";
        const warningIcon = document.createElement("span");
        warningIcon.className = "warning-icon";
        warningIcon.textContent = "⚠";
        const warningText = document.createElement("span");
        warningText.className = "warning-text";
        warningText.textContent = "Game may be unavailable";
        artWarning.append(warningIcon, warningText);
        art.appendChild(artWarning);

        // Grey textured middle border between art and type line
        const artBorder = document.createElement("div");
        artBorder.className = "card-art-border";
        artBorder.setAttribute("aria-hidden", "true");

        // Type line — dark gunmetal, silver borders
        const typeLine = document.createElement("div");
        typeLine.className = "card-type-line";
        const typeText = document.createElement("span");
        typeText.className = "card-type-text";
        typeText.textContent = "Daily Game — MTG";
        typeLine.append(typeText);

        // Text box — grey textured, description
        const textBox = document.createElement("div");
        textBox.className = "card-text-box";
        const description = document.createElement("p");
        description.className = "card-description";
        description.textContent = game.description;
        textBox.append(description);

        // Text-box zone click: show score-entry form when available, otherwise navigate
        textBox.addEventListener("click", (e) => {
          if (textBox.classList.contains("has-form")) {
            e.stopPropagation(); // form is active — don't bubble to card handler
            return;
          }
          if (maybeShowScoreForm()) return;
          // Description or stored-score is showing — navigate to the game
          window.open(game.url, "_blank", "noopener,noreferrer");
        });

        // If a score was stored for today, display it immediately
        if (storedScore) {
          description.remove();
          const scoreEl = document.createElement("p");
          scoreEl.className = "card-description card-score";
          scoreEl.textContent = storedScore;
          textBox.append(scoreEl);
          requestAnimationFrame(() => fitScoreText(scoreEl, textBox));
        }

        inner.append(header, art, artBorder, typeLine, textBox);
        card.appendChild(inner);

        // Footer strip in the dark outer frame (card number + artist/hostname)
        const footerStrip = document.createElement("div");
        footerStrip.className = "card-footer-strip";
        const footerLeft = document.createElement("span");
        footerLeft.textContent = `${String(index + 1).padStart(3, "0")} • EN`;
        const footerRight = document.createElement("span");
        footerRight.textContent = `${new URL(game.url).hostname}`;
        footerStrip.append(footerLeft, footerRight);
        card.appendChild(footerStrip);

        // Screen-reader preview status
        const previewStatus = document.createElement("span");
        previewStatus.className = "sr-only";
        previewStatus.setAttribute("aria-live", "polite");
        previewStatus.textContent = "Loading live preview.";
        card.appendChild(previewStatus);

        slot.append(card);
        item.append(slot);
        gamesContainer.appendChild(item);
        loadPreviewWithFallback(card, artWarning, previewStatus, game.url);
      }

      const initialScores = loadScores();
      dailyGames.forEach((game, index) => createGameCard(game, index, initialScores[index]?.score ?? null));
      updateShareBar(initialScores);

      // ── Image helpers ──
      function loadImage(src) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => resolve(img);
          img.src = src;
        });
      }

      let cachedFrameImg = null;
      const cachedGameImgs = {};

      // Draw an image into a canvas rect with cover behaviour (top-aligned).
      // Scales the image so it completely fills the rect while preserving its aspect
      // ratio: the wider dimension is cropped equally on both sides; the taller
      // dimension is cropped from the bottom (top-aligned, matching background-position: top center).
      function drawImageCover(ctx, img, x, y, w, h) {
        if (img.naturalWidth === 0 || img.naturalHeight === 0) return;
        const iAspect = img.naturalWidth / img.naturalHeight;
        const bAspect = w / h;
        let sx, sy, sw, sh;
        if (iAspect > bAspect) {
          sh = img.naturalHeight;
          sw = sh * bAspect;
          sx = (img.naturalWidth - sw) / 2;
          sy = 0;
        } else {
          sw = img.naturalWidth;
          sh = sw / bAspect;
          sx = 0;
          sy = 0;
        }
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.clip();
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
        ctx.restore();
      }

      async function copyScoresImage() {
        const scores = loadScores();
        const sortedKeys = Object.keys(scores).sort((a, b) => Number(a) - Number(b));
        if (sortedKeys.length === 0) return;

        // ── Canvas layout constants ──
        const CARD_W  = 280;
        const CARD_H  = 392;
        const COLS    = 3;
        const GAP     = 16;
        const PAD     = 24;
        const HDR_H   = 44;  // height of the date label row above the cards
        const DPR     = 3;   // render at 3× for sharpness

        const cols    = Math.min(sortedKeys.length, COLS);
        const rows    = Math.ceil(sortedKeys.length / COLS);
        const cssW    = cols * CARD_W + (cols - 1) * GAP + PAD * 2;
        const cssH    = rows * CARD_H + (rows - 1) * GAP + PAD * 2 + HDR_H;

        const canvas  = document.createElement("canvas");
        canvas.width  = cssW * DPR;
        canvas.height = cssH * DPR;
        const ctx     = canvas.getContext("2d");
        ctx.scale(DPR, DPR);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        // Background
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, cssW, cssH);

        // Date header
        ctx.fillStyle  = "#c5c5c5";
        ctx.font       = `bold 20px 'Cinzel', Georgia, serif`;
        ctx.textAlign  = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(`MTG Daily Games \u2014 ${getGameDayLabel()}`, cssW / 2, PAD + HDR_H / 2);

        // Load card frame once (local file — no CORS issue); cache for faster repeat copies
        if (!cachedFrameImg) cachedFrameImg = await loadImage("cardframe.jpg");
        const frameImg = cachedFrameImg;

        // Preload game images for all scored cards
        await Promise.all(sortedKeys.map(async (key) => {
          const game = dailyGames[Number(key)];
          if (game && game.image && !cachedGameImgs[game.image]) {
            cachedGameImgs[game.image] = await loadImage(game.image);
          }
        }));

        await document.fonts.ready;

        // ── Card-frame layout fractions (must match the CSS) ──
        const iL   = CARD_W * 0.055;   // inner left offset
        const iT   = CARD_H * 0.025;   // inner top offset
        const iW   = CARD_W * (1 - 0.055 * 2);
        const iH   = CARD_H * (1 - 0.025 - 0.08);
        const hdrH = iH * 0.085;       // .card-header  height
        const typH = iH * 0.075;       // .card-type-line height
        const txtH = iH * 0.33;        // .card-text-box flex-basis
        const artH = iH - hdrH - typH - txtH; // .card-art flex: 1

        const typeRelY = iT + hdrH + artH;
        const textRelY = typeRelY + typH;

        for (let i = 0; i < sortedKeys.length; i++) {
          const key  = sortedKeys[i];
          const { score } = scores[key];
          const game = dailyGames[Number(key)];

          const col  = i % COLS;
          const row  = Math.floor(i / COLS);
          const cx   = PAD + col * (CARD_W + GAP);
          const cy   = PAD + HDR_H + row * (CARD_H + GAP);

          // Draw card frame
          if (frameImg.naturalWidth > 0) {
            ctx.drawImage(frameImg, cx, cy, CARD_W, CARD_H);
          } else {
            ctx.fillStyle = "#2f4778";
            ctx.fillRect(cx, cy, CARD_W, CARD_H);
          }

          // Draw uploaded game screenshot in the art area (cover, top-aligned)
          const gameImg = game && game.image ? cachedGameImgs[game.image] : null;
          if (gameImg && gameImg.naturalWidth > 0) {
            drawImageCover(ctx, gameImg, cx + iL, cy + iT + hdrH, iW, artH);
          } else {
            ctx.fillStyle = "#2f4778";
            ctx.fillRect(cx + iL, cy + iT + hdrH, iW, artH);
          }

          // Card name
          ctx.fillStyle    = "#111";
          ctx.font         = `bold 13px 'Cinzel', Georgia, serif`;
          ctx.textAlign    = "left";
          ctx.textBaseline = "middle";
          ctx.fillText(game.title, cx + iL + 5, cy + iT + hdrH / 2 + 3, iW - 10);

          // Type line
          ctx.font      = `bold 9px 'Cinzel', Georgia, serif`;
          ctx.fillStyle = "#222";
          ctx.fillText("Daily Game \u2014 MTG", cx + iL + 8, cy + typeRelY + typH / 2, iW - 16);

          // Score
          if (score) {
            const lines   = score.split("\n");
            const availH  = txtH - 16;  // 8 px padding top + bottom
            const lineH   = lines.length > 0 ? Math.min(availH / lines.length, 26) : 20;
            const fontSize = Math.max(Math.floor(lineH * 0.82), 10);
            ctx.font         = `${fontSize}px 'Crimson Text', Georgia, serif`;
            ctx.fillStyle    = "#111";
            ctx.textAlign    = "left";
            ctx.textBaseline = "top";
            lines.forEach((line, li) => {
              ctx.fillText(line, cx + iL + 10, cy + textRelY + 8 + li * lineH, iW - 20);
            });
          }
        }

        // Copy PNG to clipboard
        return new Promise((resolve, reject) => {
          canvas.toBlob(async (blob) => {
            try {
              await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
              resolve();
            } catch (err) {
              reject(err);
            }
          }, "image/png");
        });
      }

      document.getElementById("btn-copy-text").addEventListener("click", copyScoresText);
      document.getElementById("btn-copy-image").addEventListener("click", async function () {
        const btn = this;
        btn.disabled = true;
        btn.textContent = "Copying\u2026";
        try {
          await copyScoresImage();
          btn.textContent = "Copied!";
          setTimeout(() => {
            btn.textContent = "Copy Image";
            btn.disabled = false;
          }, 2000);
        } catch {
          btn.textContent = "Copy Image";
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
