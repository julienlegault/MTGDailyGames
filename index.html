<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Daily Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #030303;
        --surface-bg: #111;
        --card-border: #fafafa;
        --text-main: #c5c5c5;
        --text-sub: #aeaeae;
        --footer-bg: rgba(0, 0, 0, 0.9);
        --footer-clearance: 4.25rem;
        --card-min-width: 120px;
        /* MTG card frame palette (artifact silver) */
        --frame-dark: #101010;
        --frame-silver: linear-gradient(180deg, #dcdcd4 0%, #c8c8c0 45%, #b8b8b0 100%);
        --frame-silver-border: #7a7a72;
        --frame-typeline: linear-gradient(180deg, #272725 0%, #1d1d1b 100%);
        --frame-textbox: linear-gradient(180deg, #c4c4bc 0%, #b6b6ae 50%, #c0c0b8 100%);
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --page-bg: #d8d8d8;
          --surface-bg: #efefef;
          --card-border: #b0b0b0;
          --text-main: #1a1a1a;
          --text-sub: #555555;
          --footer-bg: rgba(240, 240, 240, 0.95);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        text-align: center;
        font-family: "Crimson Text", Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, var(--surface-bg) 0%, var(--page-bg) 58%);
        color: var(--text-main);
      }

      main {
        flex: 1;
        width: min(1060px, 100%);
        margin: 0 auto;
        padding: 1rem 1rem var(--footer-clearance);
      }

      h1 {
        margin: 0.25rem 0 1.25rem;
        font-size: clamp(1.45rem, 4.8vw, 2rem);
        font-family: "Cinzel", Georgia, serif;
        letter-spacing: 0.03em;
      }

      /* ── Games grid ── */
      .games {
        display: grid;
        gap: 1.4rem;
        grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
      }

      /* ══ Outer card frame — dark like a physical MTG card ══ */
      .game-card {
        position: relative;
        display: flex;
        flex-direction: column;
        aspect-ratio: 5 / 7;
        width: 50%;
        /* Dark card frame — padding creates the border effect */
        background:
          repeating-linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.014) 0px,
            rgba(255, 255, 255, 0.014) 1px,
            transparent 1px,
            transparent 6px
          ),
          linear-gradient(160deg, #1c1c1a 0%, var(--frame-dark) 100%);
        border-radius: 18px;
        /* 8px frame on sides/top, 28px at bottom for the footer strip */
        padding: 8px 8px 28px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 10px 48px rgba(0, 0, 0, 0.8);
        text-decoration: none;
        color: inherit;
        overflow: hidden;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
        transform: translateZ(0);
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translateY(-5px) scale(1.02);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.13),
          0 20px 64px rgba(0, 0, 0, 0.9);
        outline: none;
      }

      /* ── Inner bordered area (clips art to edges) ── */
      .card-inner {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        border-radius: 8px;
        overflow: hidden;
        border: 1.5px solid var(--frame-silver-border);
      }

      /* ── Name bar: silver/chrome (artifact card colour) ── */
      .card-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 4px 6px 4px 9px;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.11) 0px,
            rgba(255, 255, 255, 0.11) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.055) 0px,
            rgba(0, 0, 0, 0.055) 1px,
            transparent 1px,
            transparent 4px
          ),
          linear-gradient(180deg, #dcdcd4 0%, #c8c8c0 45%, #b8b8b0 100%);
        border-bottom: 1px solid #888;
        min-height: 26px;
      }

      .card-name {
        margin: 0;
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.83rem;
        font-weight: 700;
        color: #111;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1;
      }

      /* Mana-cost circle (decorative, matches the "3" in the reference card) */
      .card-mana-cost {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 35%, #d8d8d0, #868680);
        border: 1.5px solid #444;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.58rem;
        font-weight: 700;
        font-family: "Cinzel", Georgia, serif;
        color: #111;
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.5), 0 1px 2px rgba(0, 0, 0, 0.45);
      }

      /* ── Art area: full-bleed, no blur (extended-art) ── */
      .card-art {
        flex: 1;
        min-height: 0;
        background-image: var(--card-image, linear-gradient(140deg, #2f4778, #481f56));
        background-size: cover;
        background-position: top center;
      }

      /* ── Grey textured middle border between art and type line ── */
      .card-art-border {
        flex-shrink: 0;
        height: 7px;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.13) 0px,
            rgba(255, 255, 255, 0.13) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.07) 0px,
            rgba(0, 0, 0, 0.07) 1px,
            transparent 1px,
            transparent 4px
          ),
          linear-gradient(180deg, #d6d6ce 0%, #bcbcb4 50%, #b0b0a8 100%);
        border-top: 1px solid #aaa;
        border-bottom: 1px solid #555;
      }

      /* ── Type line: dark gunmetal with silver borders ── */
      .card-type-line {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        padding: 0 8px;
        min-height: 22px;
        background: var(--frame-typeline);
        border-bottom: 1.5px solid var(--frame-silver-border);
      }

      .card-type-text {
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.63rem;
        font-weight: 700;
        color: #ccc;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Text box: light grey with diagonal crosshatch texture ── */
      .card-text-box {
        flex-shrink: 0;
        position: relative;
        /* ~25% of the inner content height */
        flex-basis: 25%;
        overflow: hidden;
        padding: 8px 10px 9px;
        background:
          repeating-linear-gradient(
            -45deg,
            rgba(0, 0, 0, 0.038) 0px,
            rgba(0, 0, 0, 0.038) 1px,
            transparent 1px,
            transparent 5px
          ),
          repeating-linear-gradient(
            45deg,
            rgba(0, 0, 0, 0.022) 0px,
            rgba(0, 0, 0, 0.022) 1px,
            transparent 1px,
            transparent 8px
          ),
          var(--frame-textbox);
      }

      .card-description {
        margin: 0;
        font-family: "Crimson Text", Georgia, serif;
        font-size: 0.82rem;
        line-height: 1.35;
        color: #111;
        text-align: left;
      }

      /* ── Footer strip inside the dark outer frame ── */
      .card-footer-strip {
        position: absolute;
        bottom: 5px;
        left: 9px;
        right: 9px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.42rem;
        color: #777;
        font-family: "Crimson Text", Georgia, serif;
        letter-spacing: 0.01em;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        margin: 0;
        padding: 0.65rem 1rem 0.75rem;
        background: var(--footer-bg);
        border-top: 1px solid var(--card-border);
        color: var(--text-sub);
        font-size: 0.92rem;
        z-index: 10;
      }

      footer a {
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Magic: The Gathering Daily Games</h1>
      <section id="games" class="games" aria-label="List of daily games"></section>
    </main>
    <footer>
      Have a game you want to see? Email
      <a href="mailto:suggestions@mtgdailygames.com">suggestions@mtgdailygames.com</a>
    </footer>

    <script>
      const dailyGames = [
        {
          title: "Spellify",
          description: "Guess the card hangman-style.",
          url: "https://edhrec.com/games/spellify",
        },
        {
          title: "Enchant Worldle",
          description: "A play on Wordle, yellow means close green means correct.",
          url: "https://enchantworldle.com/",
        },
        {
          title: "Asmrandle",
          description: "Pick the more popular of two cards based on EDHREC inclusion percentage.",
          url: "https://asmrandle.com/",
        },
        {
          title: "EDHREC Crossword",
          description: "Daily MTG crossword game on EDHREC.",
          url: "https://edhrec.com/games/crossword",
        },
        {
          title: "EDHRankle",
          description: "Similar to Asmrandle, but limited to only commanders.",
          url: "https://edhrankle.com/daily",
        },
        {
          title: "Guess the Magic Card",
          description: "Narrow down the card based on its attributes.",
          url: "https://guessthemagiccard.com/",
        },
        {
          title: "Magicdoku",
          description: "A Sudoku-style daily puzzle for MTG players.",
          url: "https://magicdoku.web.app/index.html",
        },
        {
          title: "Card Clash Synergy",
          description: "Test your MTG deck-building and synergy intuition.",
          url: "https://cardclashgames.com/synergy",
        },
      ];

      const fallbackGradient = "linear-gradient(140deg, #2f4778, #481f56)";
      const PREVIEW_WIDTH = 1200;
      const PREVIEW_LOAD_TIMEOUT = 8000;
      const TRUSTED_PREVIEW_HOSTS = new Set(["image.thum.io", "s.wordpress.com"]);
      const gamesContainer = document.getElementById("games");

      function getLivePreviewUrls(websiteUrl) {
        const encoded = encodeURIComponent(websiteUrl);
        return [
          `https://image.thum.io/get/width/${PREVIEW_WIDTH}/noanimate/${encoded}`,
          `https://s.wordpress.com/mshots/v1/${encoded}?w=${PREVIEW_WIDTH}`,
        ];
      }

      function loadPreviewWithFallback(card, status, websiteUrl) {
        const sources = getLivePreviewUrls(websiteUrl);

        function trySource(index) {
          if (index >= sources.length) {
            status.textContent = "Live preview unavailable. Fallback background shown.";
            return;
          }

          const img = new Image();
          const timeout = setTimeout(() => {
            img.src = "";
            trySource(index + 1);
          }, PREVIEW_LOAD_TIMEOUT);

          img.onload = () => {
            clearTimeout(timeout);
            try {
              const previewUrl = new URL(img.src);
              const isTrustedSource =
                previewUrl.protocol === "https:" && TRUSTED_PREVIEW_HOSTS.has(previewUrl.hostname);

              if (isTrustedSource) {
                card.style.setProperty("--card-image", `url("${previewUrl.href}")`);
                status.textContent = "Live preview loaded.";
                return;
              }
            } catch {
              // Keep fallback when URL parsing fails.
            }

            status.textContent = "Live preview unavailable. Fallback background shown.";
          };

          img.onerror = () => {
            clearTimeout(timeout);
            trySource(index + 1);
          };

          img.src = sources[index];
        }

        trySource(0);
      }

      function createGameCard(game, index) {
        const card = document.createElement("a");
        card.className = "game-card";
        card.href = game.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.style.setProperty("--card-image", fallbackGradient);

        // ── Inner bordered area ──
        const inner = document.createElement("div");
        inner.className = "card-inner";

        // Name bar: silver gradient, game title + mana-cost circle
        const header = document.createElement("div");
        header.className = "card-header";
        const cardName = document.createElement("h2");
        cardName.className = "card-name";
        cardName.textContent = game.title;
        const manaCost = document.createElement("span");
        manaCost.className = "card-mana-cost";
        manaCost.setAttribute("aria-hidden", "true");
        manaCost.textContent = String(index + 1);
        header.append(cardName, manaCost);

        // Art area — extended art, full-bleed, no blur
        const art = document.createElement("div");
        art.className = "card-art";
        art.setAttribute("aria-hidden", "true");

        // Grey textured middle border between art and type line
        const artBorder = document.createElement("div");
        artBorder.className = "card-art-border";
        artBorder.setAttribute("aria-hidden", "true");

        // Type line — dark gunmetal, silver borders
        const typeLine = document.createElement("div");
        typeLine.className = "card-type-line";
        const typeText = document.createElement("span");
        typeText.className = "card-type-text";
        typeText.textContent = "Daily Game — MTG";
        typeLine.append(typeText);

        // Text box — grey textured, description
        const textBox = document.createElement("div");
        textBox.className = "card-text-box";
        const description = document.createElement("p");
        description.className = "card-description";
        description.textContent = game.description;
        textBox.append(description);

        inner.append(header, art, artBorder, typeLine, textBox);
        card.appendChild(inner);

        // Footer strip in the dark outer frame (card number + artist/hostname)
        const footerStrip = document.createElement("div");
        footerStrip.className = "card-footer-strip";
        const footerLeft = document.createElement("span");
        footerLeft.textContent = `${String(index + 1).padStart(3, "0")} • EN`;
        const footerRight = document.createElement("span");
        footerRight.textContent = `${new URL(game.url).hostname}`;
        footerStrip.append(footerLeft, footerRight);
        card.appendChild(footerStrip);

        // Screen-reader preview status
        const previewStatus = document.createElement("span");
        previewStatus.className = "sr-only";
        previewStatus.setAttribute("aria-live", "polite");
        previewStatus.textContent = "Loading live preview.";
        card.appendChild(previewStatus);

        gamesContainer.appendChild(card);
        loadPreviewWithFallback(card, previewStatus, game.url);
      }

      dailyGames.forEach((game, index) => createGameCard(game, index));
    </script>
  </body>
</html>
