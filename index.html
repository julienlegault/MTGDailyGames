<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Daily Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --page-bg: #030303;
        --surface-bg: #111;
        --card-border: #fafafa;
        --text-main: #c5c5c5;
        --text-sub: #aeaeae;
        --footer-bg: rgba(0, 0, 0, 0.9);
        --footer-clearance: 4.25rem;
        --card-min-width: 260px;
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --page-bg: #d8d8d8;
          --surface-bg: #efefef;
          --card-border: #b0b0b0;
          --text-main: #1a1a1a;
          --text-sub: #555555;
          --footer-bg: rgba(240, 240, 240, 0.95);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        text-align: center;
        font-family: "Crimson Text", Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, var(--surface-bg) 0%, var(--page-bg) 58%);
        color: var(--text-main);
      }

      main {
        flex: 1;
        width: min(1060px, 100%);
        margin: 0 auto;
        padding: 1rem 1rem var(--footer-clearance);
      }

      h1 {
        margin: 0.25rem 0 1.25rem;
        font-size: clamp(1.45rem, 4.8vw, 2rem);
        font-family: "Cinzel", Georgia, serif;
        letter-spacing: 0.03em;
      }

      /* ── Games grid ── */
      .games {
        display: grid;
        gap: 1.2rem;
        grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
      }

      /* ── MTG extended-art card frame ── */
      .game-card {
        display: flex;
        flex-direction: column;
        aspect-ratio: 5 / 7;
        width: 100%;
        border-radius: 14px;
        border: 8px solid #1a1a1a;
        box-shadow:
          0 0 0 1.5px #5c5c5c,
          inset 0 0 0 1px rgba(255, 255, 255, 0.07),
          0 8px 32px rgba(0, 0, 0, 0.75);
        text-decoration: none;
        color: inherit;
        overflow: hidden;
        background: #1a1a1a;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        transform: translateZ(0);
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translateY(-4px) scale(1.025);
        box-shadow:
          0 0 0 1.5px #888,
          inset 0 0 0 1px rgba(255, 255, 255, 0.13),
          0 18px 52px rgba(0, 0, 0, 0.9);
        outline: none;
      }

      /* Name bar */
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 9px;
        background: linear-gradient(180deg, #313131 0%, #272727 100%);
        border-bottom: 1.5px solid #4e4e4e;
        flex-shrink: 0;
      }

      .card-name {
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.82rem;
        font-weight: 700;
        color: #ededed;
        letter-spacing: 0.04em;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.65);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Art area — no blur */
      .card-art {
        flex: 1;
        min-height: 0;
        background-image: var(--card-image, linear-gradient(140deg, #2f4778, #481f56));
        background-size: cover;
        background-position: top center;
      }

      /* Type line */
      .card-type-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 9px;
        background: linear-gradient(180deg, #282828 0%, #222 100%);
        border-top: 1.5px solid #4e4e4e;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      .card-type-text {
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.6rem;
        color: #bbb;
        letter-spacing: 0.05em;
        font-style: italic;
      }

      .card-set-symbol {
        font-size: 0.72rem;
        opacity: 0.65;
      }

      /* Parchment text box */
      .card-text-box {
        padding: 7px 10px 5px;
        background: linear-gradient(180deg, #c8c8bc 0%, #b9b9ad 100%);
        border-top: 1px solid #888;
        flex-shrink: 0;
      }

      .card-description {
        margin: 0 0 3px;
        font-family: "Crimson Text", Georgia, serif;
        font-size: 0.8rem;
        line-height: 1.35;
        color: #1a1a1a;
        font-style: italic;
        text-align: left;
      }

      .card-url-text {
        display: block;
        font-size: 0.6rem;
        color: #444;
        font-style: normal;
        text-align: left;
      }

      /* Bottom stats bar */
      .card-footer-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 3px 9px;
        background: #181818;
        border-top: 1px solid #333;
        flex-shrink: 0;
      }

      .card-footer-left {
        font-size: 0.55rem;
        color: #666;
        font-family: "Cinzel", Georgia, serif;
        letter-spacing: 0.03em;
      }

      .card-footer-right {
        font-size: 0.6rem;
        color: #888;
        font-family: "Cinzel", Georgia, serif;
        font-weight: 700;
        border: 1px solid #4a4a4a;
        border-radius: 3px;
        padding: 0 4px;
        background: rgba(255, 255, 255, 0.04);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        margin: 0;
        padding: 0.65rem 1rem 0.75rem;
        background: var(--footer-bg);
        border-top: 1px solid var(--card-border);
        color: var(--text-sub);
        font-size: 0.92rem;
        z-index: 10;
      }

      footer a {
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Magic: The Gathering Daily Games</h1>
      <section id="games" class="games" aria-label="List of daily games"></section>
    </main>
    <footer>
      Have a game you want to see? Email
      <a href="mailto:suggestions@mtgdailygames.com">suggestions@mtgdailygames.com</a>
    </footer>

    <script>
      const dailyGames = [
        {
          title: "Spellify",
          description: "Guess the card hangman-style.",
          url: "https://edhrec.com/games/spellify",
        },
        {
          title: "Enchant Worldle",
          description: "A play on Wordle, yellow means close green means correct.",
          url: "https://enchantworldle.com/",
        },
        {
          title: "Asmrandle",
          description: "Pick the more popular of two cards based on EDHREC inclusion percentage.",
          url: "https://asmrandle.com/",
        },
        {
          title: "EDHREC Crossword",
          description: "Daily MTG crossword game on EDHREC.",
          url: "https://edhrec.com/games/crossword",
        },
        {
          title: "EDHRankle",
          description: "Similar to Asmrandle, but limited to only commanders.",
          url: "https://edhrankle.com/daily",
        },
        {
          title: "Guess the Magic Card",
          description: "Narrow down the card based on its attributes.",
          url: "https://guessthemagiccard.com/",
        },
        {
          title: "Magicdoku",
          description: "A Sudoku-style daily puzzle for MTG players.",
          url: "https://magicdoku.web.app/index.html",
        },
        {
          title: "Card Clash Synergy",
          description: "Test your MTG deck-building and synergy intuition.",
          url: "https://cardclashgames.com/synergy",
        },
      ];

      const fallbackGradient = "linear-gradient(140deg, #2f4778, #481f56)";
      const PREVIEW_WIDTH = 1200;
      const PREVIEW_LOAD_TIMEOUT = 8000;
      const TRUSTED_PREVIEW_HOSTS = new Set(["image.thum.io", "s.wordpress.com"]);
      const gamesContainer = document.getElementById("games");

      function getLivePreviewUrls(websiteUrl) {
        const encoded = encodeURIComponent(websiteUrl);
        return [
          `https://image.thum.io/get/width/${PREVIEW_WIDTH}/noanimate/${encoded}`,
          `https://s.wordpress.com/mshots/v1/${encoded}?w=${PREVIEW_WIDTH}`,
        ];
      }

      function loadPreviewWithFallback(card, status, websiteUrl) {
        const sources = getLivePreviewUrls(websiteUrl);

        function trySource(index) {
          if (index >= sources.length) {
            status.textContent = "Live preview unavailable. Fallback background shown.";
            return;
          }

          const img = new Image();
          const timeout = setTimeout(() => {
            img.src = "";
            trySource(index + 1);
          }, PREVIEW_LOAD_TIMEOUT);

          img.onload = () => {
            clearTimeout(timeout);
            try {
              const previewUrl = new URL(img.src);
              const isTrustedSource =
                previewUrl.protocol === "https:" && TRUSTED_PREVIEW_HOSTS.has(previewUrl.hostname);

              if (isTrustedSource) {
                card.style.setProperty("--card-image", `url("${previewUrl.href}")`);
                status.textContent = "Live preview loaded.";
                return;
              }
            } catch {
              // Keep fallback when URL parsing fails.
            }

            status.textContent = "Live preview unavailable. Fallback background shown.";
          };

          img.onerror = () => {
            clearTimeout(timeout);
            trySource(index + 1);
          };

          img.src = sources[index];
        }

        trySource(0);
      }

      function createGameCard(game) {
        const card = document.createElement("a");
        card.className = "game-card";
        card.href = game.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.style.setProperty("--card-image", fallbackGradient);

        // Name bar
        const header = document.createElement("div");
        header.className = "card-header";
        const cardName = document.createElement("h2");
        cardName.className = "card-name";
        cardName.textContent = game.title;
        header.appendChild(cardName);

        // Art area (no blur — image set via --card-image CSS variable; decorative)
        const art = document.createElement("div");
        art.className = "card-art";
        art.setAttribute("aria-hidden", "true");

        // Type line
        const typeLine = document.createElement("div");
        typeLine.className = "card-type-line";
        const typeText = document.createElement("span");
        typeText.className = "card-type-text";
        typeText.textContent = "Daily MTG Game";
        const setSymbol = document.createElement("span");
        setSymbol.className = "card-set-symbol";
        setSymbol.setAttribute("aria-hidden", "true");
        setSymbol.textContent = "⚔";
        typeLine.append(typeText, setSymbol);

        // Parchment text box
        const textBox = document.createElement("div");
        textBox.className = "card-text-box";
        const description = document.createElement("p");
        description.className = "card-description";
        description.textContent = game.description;
        const urlSpan = document.createElement("span");
        urlSpan.className = "card-url-text";
        urlSpan.textContent = new URL(game.url).hostname;
        textBox.append(description, urlSpan);

        // Bottom stats bar
        const footerBar = document.createElement("div");
        footerBar.className = "card-footer-bar";
        const footerLeft = document.createElement("span");
        footerLeft.className = "card-footer-left";
        footerLeft.textContent = "MTG Daily Games";
        const footerRight = document.createElement("span");
        footerRight.className = "card-footer-right";
        footerRight.setAttribute("aria-hidden", "true");
        footerRight.textContent = "∞";
        footerBar.append(footerLeft, footerRight);

        // Screen-reader preview status
        const previewStatus = document.createElement("span");
        previewStatus.className = "sr-only";
        previewStatus.setAttribute("aria-live", "polite");
        previewStatus.textContent = "Loading live preview.";

        card.append(header, art, typeLine, textBox, footerBar, previewStatus);
        gamesContainer.appendChild(card);

        loadPreviewWithFallback(card, previewStatus, game.url);
      }

      dailyGames.forEach(createGameCard);
    </script>
  </body>
</html>
