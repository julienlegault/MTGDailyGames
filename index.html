    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

          "url": "https://mtgdailygames.com/",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Spellify", "url": "https://edhrec.com/games/spellify" },
            { "@type": "ListItem", "position": 2, "name": "Enchant Worldle", "url": "https://enchantworldle.com/" },
            { "@type": "ListItem", "position": 3, "name": "Asmrandle", "url": "https://asmrandle.com/" },
            { "@type": "ListItem", "position": 4, "name": "EDHREC Crossword", "url": "https://edhrec.com/games/crossword" },

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

    <style>
      :root {
        color-scheme: dark;
        --page-bg: #030303;
        --surface-bg: #111;
        --card-border: #fafafa;
        --text-main: #c5c5c5;
        --text-sub: #aeaeae;
        --footer-bg: rgba(0, 0, 0, 0.9);
        --footer-clearance: 4.25rem;
        --card-min-width: 120px;
        /* MTG card frame palette (artifact silver) */
        --frame-dark: #101010;
        --frame-silver: linear-gradient(180deg, #dcdcd4 0%, #c8c8c0 45%, #b8b8b0 100%);
        --frame-silver-border: #7a7a72;
        --frame-typeline: linear-gradient(180deg, #272725 0%, #1d1d1b 100%);
        --frame-textbox: linear-gradient(180deg, #c4c4bc 0%, #b6b6ae 50%, #c0c0b8 100%);
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --page-bg: #d8d8d8;
          --surface-bg: #efefef;
          --card-border: #b0b0b0;
          --text-main: #1a1a1a;
          --text-sub: #555555;
          --footer-bg: rgba(240, 240, 240, 0.95);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        text-align: center;
        font-family: "Crimson Text", Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, var(--surface-bg) 0%, var(--page-bg) 58%);
        color: var(--text-main);
      }

      main {
        flex: 1;
        width: min(1060px, 100%);
        margin: 0 auto;
        padding: 1rem 1rem var(--footer-clearance);
      }

      h1 {
        margin: 0.25rem 0 1.25rem;
        font-size: clamp(1.45rem, 4.8vw, 2rem);
        font-family: "Cinzel", Georgia, serif;
        letter-spacing: 0.03em;
      }

      /* ── Games grid ── */
      .games {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(2, 1fr);
      }

      @media (min-width: 600px) {
        .games {
          gap: 1.4rem;
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }
      }

      /* ══ Slot: holds grid position while card rotates inside ══ */
      .card-slot {
        position: relative;
        aspect-ratio: 5 / 7;
        width: 100%;
      }

      /* ══ Outer card frame — uses cardframe.jpg as the actual MTG card frame ══ */
      .game-card {
        position: absolute;
        inset: 0;
        background-image: url('cardframe.jpg');
        background-size: 100% 100%;
        background-repeat: no-repeat;
        border-radius: 18px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 10px 48px rgba(0, 0, 0, 0.8);
        text-decoration: none;
        color: inherit;
        overflow: hidden;
        transition: transform 0.4s ease, box-shadow 0.18s ease;
        transform: translateZ(0);
        cursor: pointer;
      }

      .game-card:hover,
      .game-card:focus-visible {
        transform: translateY(-5px) scale(1.02);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.13),
          0 20px 64px rgba(0, 0, 0, 0.9);
        outline: none;
      }

      /* ══ Inline result form — shown inside the text box after the card is clicked ══ */
      .card-text-box.has-form {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .tap-input {
        flex: 1;
        min-height: 0;
        width: 100%;
        padding: 0.4rem 0.6rem;
        font-family: "Crimson Text", Georgia, serif;
        font-size: 0.9rem;
        background: transparent;
        color: #111;
        border: 1px solid #666;
        border-radius: 6px;
        outline: none;
        resize: none;
      }

      .tap-input:focus {
        border-color: #333;
      }

      .card-score {
        white-space: pre;
        line-height: 1.3;
      }

      .tap-submit {
        width: 100%;
        padding: 0.35rem 0;
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        background: transparent;
        color: #111;
        border: 1px solid #666;
        border-radius: 6px;
        cursor: pointer;
        transition: border-color 0.15s ease, color 0.15s ease;
      }

      .tap-submit:hover {
        border-color: #222;
        color: #000;
      }

      /* ── Inner content area absolutely positioned over the frame's content zones ── */
      .card-inner {
        position: absolute;
        top: 2.5%;
        left: 5.5%;
        right: 5.5%;
        bottom: 8%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Name bar: sits on the frame's silver pill at the top ── */
      .card-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 5px 6px 0 5px;
        background: transparent;
        height: 8.5%;
      }

      .card-name {
        margin: 0;
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.83rem;
        font-weight: 700;
        color: #111;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1;
        text-align: left;
      }

      /* ── Art area: fills the frame's black art window ── */
      .card-art {
        flex: 1;
        min-height: 0;
        background-image: var(--card-image, linear-gradient(140deg, #2f4778, #481f56));
        background-size: cover;
        background-position: top center;
      }

      /* ── Art border: hidden — the frame image handles this ── */
      .card-art-border {
        display: none;
      }

      /* ── Type line: sits on the frame's silver pill in the middle ── */
      .card-type-line {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 4px;
        padding: 0 8px;
        height: 7.5%;
        background: transparent;
      }

      .card-type-text {
        font-family: "Cinzel", Georgia, serif;
        font-size: 0.63rem;
        font-weight: 700;
        color: #222;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Text box: sits in the frame's white textured area ── */
      .card-text-box {
        flex-shrink: 0;
        flex-basis: 33%;
        overflow: hidden;
        padding: 8px 10px 9px;
        background: transparent;
      }

      .card-description {
        margin: 0;
        font-family: "Crimson Text", Georgia, serif;
        font-size: 0.82rem;
        line-height: 1.35;
        color: #111;
        text-align: left;
      }

      /* ── Footer strip inside the frame's bottom border area ── */
      .card-footer-strip {
        position: absolute;
        bottom: 2%;
        left: 5.5%;
        right: 5.5%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.42rem;
        color: #444;
        font-family: "Crimson Text", Georgia, serif;
        letter-spacing: 0.01em;
      }

      @media (max-width: 599px) {
        .card-name {
          font-size: 0.68rem;
        }

        .card-description {
          font-size: 0.7rem;
          line-height: 1.3;
        }

        .card-type-text {
          font-size: 0.55rem;
        }

        .card-text-box {
          padding: 5px 7px;
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        margin: 0;
        padding: 0.65rem 1rem 0.75rem;
        background: var(--footer-bg);
        border-top: 1px solid var(--card-border);
        color: var(--text-sub);
        font-size: 0.92rem;
        z-index: 10;
      }

      footer a {
        color: var(--text-main);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Magic: The Gathering Daily Games</h1>
      <section id="games" class="games" aria-label="List of daily games"></section>
    </main>
    <footer>
      Have a game you want to see? Email
      <a href="mailto:suggestions@mtgdailygames.com">suggestions@mtgdailygames.com</a>
    </footer>

    <script>
      const dailyGames = [
        {
          title: "Spellify",
          description: "Guess the card hangman-style.",
          url: "https://edhrec.com/games/spellify",
          scoreType: "emoji",
        },
        {
          title: "Enchant Worldle",
          description: "A play on Wordle, yellow means close green means correct.",
          url: "https://enchantworldle.com/",
          scoreType: "number",
        },
        {
          title: "Asmrandle",
          description: "Pick the more popular of two cards based on EDHREC inclusion percentage.",
          url: "https://asmrandle.com/",
          scoreType: "emoji",
        },
        {
          title: "EDHREC Crossword",
          description: "Daily MTG crossword game on EDHREC.",
          url: "https://edhrec.com/games/crossword",
          scoreType: "none",
        },
        {
          title: "Commander Codex",
          description: "A wordle-like game by Archidekt.",
          url: "https://commandercodex.com/",
          scoreType: "emoji",
        },
        {
          title: "EDHRankle",
          description: "Similar to Asmrandle, but limited to only commanders.",
          url: "https://edhrankle.com/daily",
          scoreType: "none",
        },
        {
          title: "Guess the Magic Card",
          description: "Narrow down the card based on its attributes.",
          url: "https://guessthemagiccard.com/",
          scoreType: "emoji",
        },
        {
          title: "Magicdoku",
          description: "A Sudoku-style daily puzzle for MTG players.",
          url: "https://magicdoku.web.app/index.html",
          scoreType: "emoji",
        },
        {
          title: "Card Clash Synergy",
          description: "Test your MTG deck-building and synergy intuition.",
          url: "https://cardclashgames.com/synergy",
          scoreType: "emoji",
        },
        {
          title: "Possibility Storm",
          description: "Daily find-lethal puzzles.",
          url: "https://www.possibilitystorm.com/",
          scoreType: "none",
        },
      ];

      const fallbackGradient = "linear-gradient(140deg, #2f4778, #481f56)";
      const PREVIEW_WIDTH = 1200;
      const PREVIEW_LOAD_TIMEOUT = 8000;
      const TRUSTED_PREVIEW_HOSTS = new Set(["image.thum.io", "s.wordpress.com"]);
      const gamesContainer = document.getElementById("games");

      // Match emoji sequences: base Extended_Pictographic + optional variation selector,
      // skin tone modifier, or a single level of ZWJ composition.
      const EMOJI_RE = /\p{Extended_Pictographic}(?:[\u{FE00}-\u{FE0F}]|\u{20E3}|[\u{1F3FB}-\u{1F3FF}])?(?:\u{200D}\p{Extended_Pictographic}(?:[\u{FE00}-\u{FE0F}]|\u{20E3}|[\u{1F3FB}-\u{1F3FF}])?)?/gu;

      function parseScore(text, scoreType) {
        if (scoreType === "number") {
          // Enchant Wordle result is a bare number (e.g. "12")
          const match = text.trim().match(/\d+/);
          return match ? match[0] : null;
        }
        if (scoreType === "emoji") {
          // Keep per-line emoji sequences, drop lines with no emojis
          const lines = text.split("\n").map((line) => {
            const matches = line.match(EMOJI_RE);
            return matches ? matches.join("") : "";
          }).filter((line) => line.length > 0);
          return lines.length > 0 ? lines.join("\n") : null;
        }
        return null;
      }

      function fitScoreText(el, container) {
        let size = 1.4; // rem
        el.style.fontSize = size + "rem";
        while (size > 0.3 && (el.scrollHeight > container.clientHeight || el.scrollWidth > container.clientWidth)) {
          size = parseFloat((size - 0.05).toFixed(2));
          el.style.fontSize = size + "rem";
        }
      }

      function getLivePreviewUrls(websiteUrl) {
        const encoded = encodeURIComponent(websiteUrl);
        return [
          `https://image.thum.io/get/width/${PREVIEW_WIDTH}/noanimate/${encoded}`,
          `https://s.wordpress.com/mshots/v1/${encoded}?w=${PREVIEW_WIDTH}`,
        ];
      }

      function loadPreviewWithFallback(card, status, websiteUrl) {
        const sources = getLivePreviewUrls(websiteUrl);

        function trySource(index) {
          if (index >= sources.length) {
            status.textContent = "Live preview unavailable. Fallback background shown.";
            return;
          }

          const img = new Image();
          const timeout = setTimeout(() => {
            img.src = "";
            trySource(index + 1);
          }, PREVIEW_LOAD_TIMEOUT);

          img.onload = () => {
            clearTimeout(timeout);
            try {
              const previewUrl = new URL(img.src);
              const isTrustedSource =
                previewUrl.protocol === "https:" && TRUSTED_PREVIEW_HOSTS.has(previewUrl.hostname);

              if (isTrustedSource) {
                card.style.setProperty("--card-image", `url("${previewUrl.href}")`);
                status.textContent = "Live preview loaded.";
                return;
              }
            } catch {
              // Keep fallback when URL parsing fails.
            }

            status.textContent = "Live preview unavailable. Fallback background shown.";
          };

          img.onerror = () => {
            clearTimeout(timeout);
            trySource(index + 1);
          };

          img.src = sources[index];
        }

        trySource(0);
      }

      function createGameCard(game, index) {
        // ── Item: grid cell containing the slot ──
        const item = document.createElement("div");
        item.className = "game-item";

        // ── Slot: maintains aspect ratio while card sits inside ──
        const slot = document.createElement("div");
        slot.className = "card-slot";

        const card = document.createElement("a");
        card.className = "game-card";
        card.href = game.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.style.setProperty("--card-image", fallbackGradient);

        if (game.scoreType !== "none") {
          card.addEventListener("click", () => {
            if (textBox.classList.contains("has-form")) return;
            description.remove();
            textBox.classList.add("has-form");
            const tapInput = document.createElement("textarea");
            tapInput.className = "tap-input";
            tapInput.placeholder = "Paste results here";
            tapInput.setAttribute("aria-label", `Result for ${game.title}`);
            // Prevent textarea clicks from following the card's anchor link
            tapInput.addEventListener("click", (e) => e.stopPropagation());
            const tapSubmit = document.createElement("button");
            tapSubmit.type = "button";
            tapSubmit.className = "tap-submit";
            tapSubmit.textContent = "Submit";
            tapSubmit.addEventListener("click", (e) => {
              e.stopPropagation();
              const raw = tapInput.value.trim();
              if (!raw) return;
              const score = parseScore(raw, game.scoreType);
              textBox.classList.remove("has-form");
              while (textBox.firstChild) textBox.removeChild(textBox.firstChild);
              const scoreEl = document.createElement("p");
              scoreEl.className = "card-description card-score";
              scoreEl.textContent = score !== null ? score : "Could not parse score.";
              textBox.append(scoreEl);
              requestAnimationFrame(() => fitScoreText(scoreEl, textBox));
            });
            textBox.append(tapInput, tapSubmit);
          });
        }
        // ── Inner bordered area ──
        const inner = document.createElement("div");
        inner.className = "card-inner";

        // Name bar: silver gradient, game title + mana-cost circle
        const header = document.createElement("div");
        header.className = "card-header";
        const cardName = document.createElement("h2");
        cardName.className = "card-name";
        cardName.textContent = game.title;
        header.append(cardName);

        // Art area — extended art, full-bleed, no blur
        const art = document.createElement("div");
        art.className = "card-art";
        art.setAttribute("aria-hidden", "true");

        // Grey textured middle border between art and type line
        const artBorder = document.createElement("div");
        artBorder.className = "card-art-border";
        artBorder.setAttribute("aria-hidden", "true");

        // Type line — dark gunmetal, silver borders
        const typeLine = document.createElement("div");
        typeLine.className = "card-type-line";
        const typeText = document.createElement("span");
        typeText.className = "card-type-text";
        typeText.textContent = "Daily Game — MTG";
        typeLine.append(typeText);

        // Text box — grey textured, description
        const textBox = document.createElement("div");
        textBox.className = "card-text-box";
        const description = document.createElement("p");
        description.className = "card-description";
        description.textContent = game.description;
        textBox.append(description);

        inner.append(header, art, artBorder, typeLine, textBox);
        card.appendChild(inner);

        // Footer strip in the dark outer frame (card number + artist/hostname)
        const footerStrip = document.createElement("div");
        footerStrip.className = "card-footer-strip";
        const footerLeft = document.createElement("span");
        footerLeft.textContent = `${String(index + 1).padStart(3, "0")} • EN`;
        const footerRight = document.createElement("span");
        footerRight.textContent = `${new URL(game.url).hostname}`;
        footerStrip.append(footerLeft, footerRight);
        card.appendChild(footerStrip);

        // Screen-reader preview status
        const previewStatus = document.createElement("span");
        previewStatus.className = "sr-only";
        previewStatus.setAttribute("aria-live", "polite");
        previewStatus.textContent = "Loading live preview.";
        card.appendChild(previewStatus);

        slot.append(card);
        item.append(slot);
        gamesContainer.appendChild(item);
        loadPreviewWithFallback(card, previewStatus, game.url);
      }

      dailyGames.forEach((game, index) => createGameCard(game, index));
    </script>
  </body>
